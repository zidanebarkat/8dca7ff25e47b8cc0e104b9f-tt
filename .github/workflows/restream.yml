name: Restream
on:
  workflow_dispatch:
    inputs:
      source_url:
        description: Source URL (Twitch/YouTube/etc)
        required: true
      output_url:
        description: TikTok RTMP URL
        required: true
      title:
        description: Stream title
        required: false
        default: 'Live Stream'
      overlay_text:
        description: Overlay text on video
        required: false
        default: ''
      github_token:
        description: GitHub PAT for self-trigger
        required: false
        default: ''
      cookies_b64:
        description: Base64-encoded YouTube cookies (Netscape format)
        required: false
        default: ''
      preview:
        description: Preview mode (no streaming)
        required: false
        default: 'false'

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-${{ hashFiles('.github/workflows/restream.yml') }}
          restore-keys: apt-${{ runner.os }}-

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends ffmpeg build-essential libssl-dev fonts-dejavu-core curl unzip
          pip install -q yt-dlp curl_cffi websocket-client pillow
          curl -fsSL https://deno.land/install.sh | sh || true
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Setup cookies
        run: |
          if [ -n "${{ inputs.cookies_b64 }}" ]; then
            echo "${{ inputs.cookies_b64 }}" | base64 -d > cookies.txt
            echo "COOKIES=--cookies cookies.txt" >> $GITHUB_ENV
            echo "Cookies loaded ($(wc -c < cookies.txt) bytes)"
          else
            echo "COOKIES=" >> $GITHUB_ENV
            echo "No cookies provided"
          fi

      - name: Validate font
        run: |
          FONT="/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"
          [ -f "$FONT" ] || { echo "FATAL: font missing at $FONT"; exit 1; }

      - name: Resolve source HLS
        id: resolve
        run: |
          url="${{ inputs.source_url }}"
          if echo "$url" | grep -qiE '\.(m3u8)($|\?)'; then
            echo "hls=$url" >> "$GITHUB_OUTPUT"
            echo "live=true" >> "$GITHUB_OUTPUT"
          else
            hls=$(yt-dlp --impersonate chrome --remote-components ejs:github --extractor-args "youtube:player_client=web" $COOKIES -g --socket-timeout 30 "$url" 2>/tmp/yt_err.txt | tail -1) || true
            cat /tmp/yt_err.txt
            if [ -z "$hls" ]; then
              echo "live=false" >> "$GITHUB_OUTPUT"
              echo "ERROR: Could not resolve source URL"
              exit 1
            fi
            echo "hls=$hls" >> "$GITHUB_OUTPUT"
            echo "live=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Schedule self-reboot (before 6h limit)
        if: inputs.github_token != '' && inputs.preview != 'true'
        run: |
          (sleep 21000 && curl -s -X POST \
            -H "Authorization: Bearer ${{ inputs.github_token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/restream.yml/dispatches" \
            -d '{"ref":"main","inputs":{
              "source_url":"${{ inputs.source_url }}",
              "output_url":"${{ inputs.output_url }}",
              "title":"${{ inputs.title }}",
              "overlay_text":"${{ inputs.overlay_text }}",
              "github_token":"${{ inputs.github_token }}",
              "cookies_b64":"${{ inputs.cookies_b64 }}",
              "preview":"${{ inputs.preview }}"
            }}') &

      - name: Live restream
        if: steps.resolve.outputs.live == 'true' && inputs.preview != 'true'
        env:
          OT: ${{ inputs.overlay_text }}
        run: |
          HLS="${{ steps.resolve.outputs.hls }}"
          PWL="file,http,https,tcp,tls,crypto,srt,rtmp,rtmps"
          FONT="/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"
          echo "$OT" > overlay.txt
          (while true; do
            OVERLAY=$(curl -s -H "Authorization: Bearer ${{ inputs.github_token }}" \
              "https://api.github.com/repos/${{ github.repository }}/contents/overlay_state.txt" 2>/dev/null \
              | python3 -c "import sys,json,base64; d=json.load(sys.stdin); print(base64.b64decode(d.get('content','')).decode().strip() if 'content' in d else '')" 2>/dev/null || true)
            echo "$OVERLAY" > overlay.txt
            sleep 10
          done) &
          BEVELED="drawtext=textfile=overlay.txt:reload=1:fontfile=$FONT:fontsize=h*0.05:fontcolor=0x1a0b2e:x=(w-text_w)/2+5:y=(h-text_h)/2+5,drawtext=textfile=overlay.txt:reload=1:fontfile=$FONT:fontsize=h*0.05:fontcolor=0x3a1f5e:x=(w-text_w)/2+3:y=(h-text_h)/2+3,drawtext=textfile=overlay.txt:reload=1:fontfile=$FONT:fontsize=h*0.05:fontcolor=0x6b3f96:x=(w-text_w)/2+1:y=(h-text_h)/2+1,drawtext=textfile=overlay.txt:reload=1:fontfile=$FONT:fontsize=h*0.05:fontcolor=0xC9A2FF:box=1:boxcolor=0x0a0512@0.6:boxborderw=26:bordercolor=0x1a0b2e:borderw=2:x=(w-text_w)/2:y=(h-text_h)/2:shadowcolor=black@0.85:shadowx=6:shadowy=6"
          VF="[0:v]scale='min(1920,iw)':'min(1080,ih)':force_original_aspect_ratio=decrease,$BEVELED[main];[main]format=yuv420p[out]"
          URL="${{ inputs.output_url }}"
          if [[ "$URL" == srt://* ]]; then
            FORMAT="mpegts"
          else
            FORMAT="flv"
          fi
          ARGS=(-nostdin -re -protocol_whitelist "$PWL" -fflags +discardcorrupt -timeout 30000000 -thread_queue_size 1024 -i "$HLS" -filter_complex "$VF" -map '[out]' -map 0:a -c:v libx264 -preset ultrafast -r 60 -b:v 12000k -maxrate 12000k -bufsize 24000k -g 120 -x264-params "keyint=120:min-keyint=120:level=5.1" -pix_fmt yuv420p -c:a aac -b:a 192k -flush_packets 1 -max_muxing_queue_size 9999 -f "$FORMAT" "$URL")
          for attempt in $(seq 1 50); do
            echo "=== Stream attempt $attempt at $(date) ==="
            ffmpeg -hide_banner -loglevel warning "${ARGS[@]}" && break
            EXIT_CODE=$?
            echo "ffmpeg exited with code $EXIT_CODE, restarting in $((attempt * 2))s..."
            sleep $((attempt * 2 > 30 ? 30 : attempt * 2))
          done
