name: Restream
on:
  workflow_dispatch:
    inputs:
      source_url:
        description: Source URL (Twitch/YouTube/etc)
        required: true
      output_url:
        description: TikTok RTMP URL
        required: true
      title:
        description: Stream title
        required: false
        default: 'Live Stream'
      overlay_text:
        description: Overlay text on video
        required: false
        default: ''
      github_token:
        description: GitHub PAT for self-trigger
        required: false
        default: ''
      cookies_b64:
        description: Base64-encoded YouTube cookies (Netscape format)
        required: false
        default: ''
      preview:
        description: Preview mode (no streaming)
        required: false
        default: 'false'

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-${{ hashFiles('.github/workflows/restream.yml') }}
          restore-keys: apt-${{ runner.os }}-

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends ffmpeg build-essential libssl-dev fonts-dejavu-core curl unzip
          pip install -q yt-dlp curl_cffi websocket-client pillow

      - name: Setup cookies
        run: |
          if [ -n "${{ inputs.cookies_b64 }}" ]; then
            echo "${{ inputs.cookies_b64 }}" | base64 -d > cookies.txt
            echo "COOKIES=--cookies cookies.txt" >> $GITHUB_ENV
            echo "Cookies loaded ($(wc -c < cookies.txt) bytes)"
          else
            echo "COOKIES=" >> $GITHUB_ENV
            echo "No cookies provided"
          fi

      - name: Validate font
        run: |
          FONT="/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"
          [ -f "$FONT" ] || { echo "FATAL: font missing at $FONT"; exit 1; }

      - name: Schedule self-reboot (before 6h limit)
        if: inputs.github_token != '' && inputs.preview != 'true'
        run: |
          (sleep 21000 && curl -s -X POST \
            -H "Authorization: Bearer ${{ inputs.github_token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/restream.yml/dispatches" \
            -d '{"ref":"main","inputs":{
              "source_url":"${{ inputs.source_url }}",
              "output_url":"${{ inputs.output_url }}",
              "title":"${{ inputs.title }}",
              "overlay_text":"${{ inputs.overlay_text }}",
              "github_token":"${{ inputs.github_token }}",
              "cookies_b64":"${{ inputs.cookies_b64 }}",
              "preview":"${{ inputs.preview }}"
            }}') &

      - name: Live restream
        if: inputs.preview != 'true'
        run: |
          URL="${{ inputs.output_url }}"
          SOURCE="${{ inputs.source_url }}"
          if [[ "$URL" == srt://* ]]; then
            FORMAT="mpegts"
          else
            FORMAT="flv"
          fi
          if echo "$SOURCE" | grep -qiE '\.(m3u8)($|\?)'; then
            PWL="file,http,https,tcp,tls,crypto,srt,rtmp,rtmps"
            while true; do
              echo "=== HLS stream started at $(date) ==="
              ffmpeg -hide_banner -stream_loop -1 -protocol_whitelist "$PWL" \
                -fflags +discardcorrupt -timeout 30000000 -thread_queue_size 1024 \
                -i "$SOURCE" \
                -c:v libx264 -preset fast -r 30 -b:v 6000k -maxrate 6000k -bufsize 12000k \
                -g 60 -pix_fmt yuv420p \
                -c:a aac -b:a 192k -ar 44100 \
                -flush_packets 1 -max_muxing_queue_size 9999 \
                -f "$FORMAT" "$URL"
              echo "ffmpeg exited with code $?, restarting in 5s..."
              sleep 5
            done
          else
            while true; do
              echo "=== YouTube pipe stream started at $(date) ==="
              yt-dlp --impersonate chrome --remote-components ejs:github $COOKIES \
                -f "best[height<=1080]/best" \
                --socket-timeout 30 \
                -o - \
                "$SOURCE" 2>/tmp/yt_err.txt | \
              ffmpeg -hide_banner -i pipe:0 \
                -c:v libx264 -preset fast -r 30 -b:v 6000k -maxrate 6000k -bufsize 12000k \
                -g 60 -pix_fmt yuv420p \
                -c:a aac -b:a 192k -ar 44100 \
                -flush_packets 1 -max_muxing_queue_size 9999 \
                -f "$FORMAT" "$URL"
              EXIT_CODE=${PIPESTATUS[0]}
              echo "yt-dlp exit: $EXIT_CODE, ffmpeg exit: $PIPESTATUS[1]"
              cat /tmp/yt_err.txt
              echo "Restarting in 5s..."
              sleep 5
            done
          fi
